<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avyro.ai — Don't Think. Train.</title>
  <meta name="description" content="AI-powered fitness coaching that adapts to how your body actually feels. Coming soon to iOS and Android." />
  <meta property="og:title" content="Avyro.ai — Don't Think. Train." />
  <meta property="og:description" content="AI-powered fitness coaching that adapts to how your body actually feels." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://avyro.app" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="theme-color" content="#07090F" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #07090F;
      --surface: #0D1420;
      --cyan: #00C8FF;
      --mint: #00F0C8;
      --pink: #FF3D8A;
      --purple: #A855F7;
      --gold: #FFB800;
      --text: #FFFFFF;
      --text-sec: rgba(255,255,255,0.55);
      --text-dim: rgba(255,255,255,0.25);
      --border: rgba(255,255,255,0.07);
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* Animated rings */
    .rings {
      position: relative;
      width: 240px;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border-style: solid;
      border-width: 1.5px;
      opacity: 0;
      animation: ringExpand 3s ease-out infinite;
    }

    .ring-1 {
      width: 200px; height: 200px;
      border-color: var(--cyan);
      animation-delay: 0s;
    }
    .ring-2 {
      width: 150px; height: 150px;
      border-color: var(--mint);
      animation-delay: 0.4s;
    }
    .ring-3 {
      width: 100px; height: 100px;
      border-color: var(--purple);
      animation-delay: 0.8s;
    }

    @keyframes ringExpand {
      0% { opacity: 0.8; transform: scale(0.5); }
      100% { opacity: 0; transform: scale(1.5); }
    }

    /* Glow behind rings */
    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,200,255,0.08) 0%, transparent 70%);
      filter: blur(40px);
      z-index: -1;
    }

    /* Text content */
    .content {
      text-align: center;
      margin-top: 48px;
      animation: fadeUp 1s ease 0.6s both;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 56px;
      letter-spacing: 8px;
      color: var(--text);
      line-height: 1;
    }

    .logo-accent {
      color: var(--mint);
    }

    .subtitle {
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .slogan {
      font-family: 'Barlow', sans-serif;
      font-weight: 500;
      font-size: 16px;
      color: var(--text-sec);
      margin-top: 20px;
      letter-spacing: 1.5px;
    }

    .slogan-accent {
      color: var(--mint);
    }

    /* Coming soon badge */
    .coming-soon {
      margin-top: 48px;
      animation: fadeUp 1s ease 1s both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 40px;
      background: linear-gradient(135deg, rgba(0,240,200,0.08), rgba(0,200,255,0.08));
      border: 1px solid rgba(0,200,255,0.2);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 3px;
      color: var(--cyan);
      text-transform: uppercase;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--mint);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .logo { font-size: 40px; letter-spacing: 5px; }
      .slogan { font-size: 14px; }
    }

    /* Background grid pattern */
    .bg-pattern {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: -2;
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>

  <div class="page">
    <!-- Animated rings (loading screen) -->
    <div class="rings">
      <div class="glow"></div>
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
    </div>

    <!-- Logo + Slogan -->
    <div class="content">
      <h1 class="logo">AVYRO<span class="logo-accent">.AI</span></h1>
      <p class="subtitle">AI Performance Coach</p>
      <p class="slogan">Don't Think. <span class="slogan-accent">Train.</span></p>
    </div>

    <!-- Coming Soon badge -->
    <div class="coming-soon">
      <div class="badge">
        <span class="badge-dot"></span>
        Coming Soon
      </div>
    </div>
  </div>
</body>
</html>
