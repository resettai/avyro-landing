<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avyro.ai — Don't Think. Train.</title>
  <meta name="description" content="AI-powered fitness coaching that adapts to how your body actually feels. Coming soon to iOS and Android." />
  <meta property="og:title" content="Avyro.ai — Don't Think. Train." />
  <meta property="og:description" content="AI-powered fitness coaching that adapts to how your body actually feels." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://avyro.ai" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="theme-color" content="#07090F" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #07090F;
      --surface: #0D1420;
      --cyan: #00C8FF;
      --mint: #00F0C8;
      --pink: #FF3D8A;
      --purple: #A855F7;
      --gold: #FFB800;
      --text: #FFFFFF;
      --text-sec: rgba(255,255,255,0.55);
      --text-dim: rgba(255,255,255,0.25);
      --border: rgba(255,255,255,0.07);
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* Animated rings */
    .rings {
      position: relative;
      width: 240px;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border-style: solid;
      border-width: 1.5px;
      opacity: 0;
      animation: ringExpand 3s ease-out infinite;
    }

    .ring-1 {
      width: 200px; height: 200px;
      border-color: var(--cyan);
      animation-delay: 0s;
    }
    .ring-2 {
      width: 150px; height: 150px;
      border-color: var(--mint);
      animation-delay: 0.4s;
    }
    .ring-3 {
      width: 100px; height: 100px;
      border-color: var(--purple);
      animation-delay: 0.8s;
    }

    @keyframes ringExpand {
      0% { opacity: 0.8; transform: scale(0.5); }
      100% { opacity: 0; transform: scale(1.5); }
    }

    /* Glow behind rings */
    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,200,255,0.08) 0%, transparent 70%);
      filter: blur(40px);
      z-index: -1;
    }

    /* Text content */
    .content {
      text-align: center;
      margin-top: 48px;
      animation: fadeUp 1s ease 0.6s both;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 56px;
      letter-spacing: 8px;
      color: var(--text);
      line-height: 1;
    }

    .slogan {
      font-family: 'Barlow', sans-serif;
      font-weight: 500;
      font-size: 16px;
      color: var(--text-sec);
      margin-top: 10px;
      letter-spacing: 1.5px;
    }

    /* Coming soon badge */
    .coming-soon {
      margin-top: 48px;
      animation: fadeUp 1s ease 1s both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 40px;
      background: linear-gradient(135deg, rgba(0,240,200,0.08), rgba(0,200,255,0.08));
      border: 1px solid rgba(0,200,255,0.2);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 3px;
      color: var(--cyan);
      text-transform: uppercase;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--mint);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    /* Features */
    .features {
      display: flex;
      gap: 16px;
      margin-top: 56px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 600px;
      padding: 0 24px;
      animation: fadeUp 1s ease 1.4s both;
    }

    .feature-tag {
      padding: 8px 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-sec);
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .feature-tag:hover {
      border-color: rgba(0,200,255,0.3);
      background: rgba(0,200,255,0.06);
      color: var(--cyan);
    }

    /* Email signup */
    .signup {
      margin-top: 48px;
      animation: fadeUp 1s ease 1.8s both;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .signup-label {
      font-family: 'Barlow', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--text-sec);
      letter-spacing: 0.5px;
    }

    .signup-form {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .signup-input {
      height: 48px;
      width: 260px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.13);
      background: var(--surface);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      padding: 0 16px;
      outline: none;
      transition: border-color 0.3s ease;
    }

    .signup-input::placeholder {
      color: var(--text-dim);
    }

    .signup-input:focus {
      border-color: var(--cyan);
    }

    .signup-btn {
      height: 48px;
      padding: 0 24px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--mint), var(--cyan));
      color: var(--bg);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .signup-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0,200,255,0.3);
    }

    .signup-btn:active {
      transform: translateY(0);
    }

    .signup-success {
      display: none;
      font-family: 'Barlow', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: var(--mint);
    }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 32px;
      text-align: center;
      animation: fadeUp 1s ease 2.2s both;
    }

    .footer-text {
      font-family: 'Barlow', sans-serif;
      font-weight: 400;
      font-size: 12px;
      color: var(--text-dim);
    }

    .footer-links {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 8px;
    }

    .footer-link {
      font-family: 'Barlow', sans-serif;
      font-weight: 500;
      font-size: 12px;
      color: var(--text-sec);
      text-decoration: none;
      transition: color 0.3s;
    }

    .footer-link:hover {
      color: var(--cyan);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .logo { font-size: 40px; letter-spacing: 5px; }
      .slogan { font-size: 14px; }
      .signup-form { flex-direction: column; }
      .signup-input { width: 280px; }
      .signup-btn { width: 280px; }
      .features { gap: 10px; }
    }

    /* Background grid pattern */
    .bg-pattern {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: -2;
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>

  <div class="page">
    <!-- Animated rings (loading screen) -->
    <div class="rings">
      <div class="glow"></div>
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
    </div>

    <!-- Logo + Slogan -->
    <div class="content">
      <h1 class="logo">AVYRO</h1>
      <p class="slogan">Don't Think. Train.</p>
    </div>

    <!-- Coming Soon badge -->
    <div class="coming-soon">
      <div class="badge">
        <span class="badge-dot"></span>
        Coming Soon
      </div>
    </div>

    <!-- Feature tags -->
    <div class="features">
      <span class="feature-tag">AI Coach</span>
      <span class="feature-tag">HRV Tracking</span>
      <span class="feature-tag">Smart Programs</span>
      <span class="feature-tag">Group Training</span>
      <span class="feature-tag">Live Workouts</span>
      <span class="feature-tag">Apple Health</span>
      <span class="feature-tag">Streak System</span>
      <span class="feature-tag">Travel Mode</span>
    </div>

    <!-- Waitlist signup -->
    <div class="signup">
      <p class="signup-label">Get early access</p>
      <div class="signup-form" id="signupForm">
        <input type="email" class="signup-input" placeholder="your@email.com" id="emailInput" />
        <button class="signup-btn" onclick="handleSignup()">NOTIFY ME</button>
      </div>
      <p class="signup-success" id="signupSuccess">You're on the list. We'll be in touch.</p>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p class="footer-text">Avyro.ai &mdash; AI-powered fitness coaching</p>
      <div class="footer-links">
        <a href="mailto:hello@avyro.ai" class="footer-link">Contact</a>
        <a href="#" class="footer-link">Privacy</a>
        <a href="#" class="footer-link">Terms</a>
      </div>
    </div>
  </div>

  <script>
    function handleSignup() {
      const input = document.getElementById('emailInput');
      const form = document.getElementById('signupForm');
      const success = document.getElementById('signupSuccess');
      const email = input.value.trim();

      if (email && email.includes('@') && email.includes('.')) {
        form.style.display = 'none';
        success.style.display = 'block';
        // In production, send to backend/Supabase
        console.log('Waitlist signup:', email);
      } else {
        input.style.borderColor = '#FF3D8A';
        setTimeout(() => { input.style.borderColor = 'rgba(255,255,255,0.13)'; }, 2000);
      }
    }

    // Allow enter key to submit
    document.getElementById('emailInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleSignup();
    });
  </script>
</body>
</html>
