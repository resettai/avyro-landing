<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avyro.ai — Beta Access</title>
  <meta name="description" content="Sign in to access the Avyro.ai beta." />
  <meta name="theme-color" content="#07090F" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #07090F;
      --surface: #0D1420;
      --surface2: #121C2A;
      --cyan: #00C8FF;
      --mint: #00F0C8;
      --pink: #FF3D8A;
      --purple: #A855F7;
      --gold: #FFB800;
      --text: #FFFFFF;
      --text-sec: rgba(255,255,255,0.55);
      --text-dim: rgba(255,255,255,0.25);
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg-pattern {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: -2;
    }

    .glow-bg {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,200,255,0.06) 0%, transparent 70%);
      filter: blur(60px);
      z-index: -1;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: fadeUp 0.8s ease both;
    }

    /* Logo section */
    .logo-section {
      text-align: center;
      margin-bottom: 48px;
    }

    .rings {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border-style: solid;
      border-width: 1.5px;
      opacity: 0;
      animation: ringExpand 3s ease-out infinite;
    }

    .ring-1 { width: 100px; height: 100px; border-color: var(--cyan); animation-delay: 0s; }
    .ring-2 { width: 75px; height: 75px; border-color: var(--mint); animation-delay: 0.4s; }
    .ring-3 { width: 50px; height: 50px; border-color: var(--purple); animation-delay: 0.8s; }

    @keyframes ringExpand {
      0% { opacity: 0.8; transform: scale(0.5); }
      100% { opacity: 0; transform: scale(1.5); }
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 36px;
      letter-spacing: 6px;
      color: var(--text);
      line-height: 1;
    }

    .logo-accent { color: var(--mint); }

    .subtitle {
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 9px;
      color: var(--text-dim);
      margin-top: 8px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* Card */
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 28px;
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--mint), var(--cyan));
    }

    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 24px;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 14px;
      color: var(--text-sec);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      height: 54px;
      padding: 0 18px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 14px;
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 16px;
      font-weight: 500;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-input::placeholder {
      color: var(--text-dim);
    }

    .form-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,200,255,0.1);
    }

    .form-input.error {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(255,61,138,0.1);
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      height: 54px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--mint), var(--cyan));
      color: var(--bg);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 16px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.1s ease;
      position: relative;
      overflow: hidden;
    }

    .submit-btn:hover {
      opacity: 0.9;
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .submit-btn .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(7,9,15,0.3);
      border-top-color: var(--bg);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .submit-btn.loading .btn-text { display: none; }
    .submit-btn.loading .spinner { display: inline-block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error message */
    .error-msg {
      color: var(--pink);
      font-size: 13px;
      font-weight: 600;
      margin-top: 12px;
      text-align: center;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .error-msg.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Beta badge */
    .beta-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 32px;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(168,85,247,0.1), rgba(0,200,255,0.1));
      border: 1px solid rgba(168,85,247,0.2);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--purple);
      text-transform: uppercase;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--purple);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .logo { font-size: 28px; letter-spacing: 4px; }
      .login-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="glow-bg"></div>

  <div class="login-container">
    <!-- Logo -->
    <div class="logo-section">
      <div class="rings">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
      </div>
      <h1 class="logo">AVYRO<span class="logo-accent">.AI</span></h1>
      <p class="subtitle">AI Performance Coach</p>
    </div>

    <!-- Login card -->
    <div class="login-card">
      <h2 class="card-title">Beta Access</h2>
      <p class="card-desc">Enter the password to preview the Avyro experience.</p>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Enter access code"
            autocomplete="off"
            autofocus
          />
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="btn-text">Sign In</span>
          <span class="spinner"></span>
        </button>

        <p class="error-msg" id="errorMsg">Wrong password. Try again.</p>
      </form>
    </div>

    <!-- Beta badge -->
    <div class="beta-badge">
      <div class="badge">
        <span class="badge-dot"></span>
        Beta Preview
      </div>
    </div>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMsg');
      const input = document.getElementById('password');

      if (!password) {
        input.classList.add('error');
        return;
      }

      // Loading state
      btn.classList.add('loading');
      btn.disabled = true;
      errorMsg.classList.remove('visible');
      input.classList.remove('error');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });

        if (res.ok) {
          // Success - redirect to home
          window.location.href = '/';
        } else {
          // Wrong password
          input.classList.add('error');
          errorMsg.classList.add('visible');
          input.value = '';
          input.focus();
        }
      } catch (err) {
        errorMsg.textContent = 'Connection error. Try again.';
        errorMsg.classList.add('visible');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    // Remove error state on input
    document.getElementById('password').addEventListener('input', function() {
      this.classList.remove('error');
      document.getElementById('errorMsg').classList.remove('visible');
    });
  </script>
</body>
</html>
